<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Quiz Dashboard</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    font-family: Arial, sans-serif;
    background:#f3eefc;
    margin:0;
    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#6d28d9;
}

input,select{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#7e22ce;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#6b21a8;
}

hr{
    margin:25px 0;
}

.card{
    margin-top:30px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 3px 15px rgba(0,0,0,.1);
}

.question-box{
    margin-bottom:25px;
    padding:20px;
    border:1px solid #ddd;
    border-radius:10px;
}

.option{
    display:block;
    margin:12px 0;
    font-size:16px;
}

.option input{
    width:auto;
    margin-right:10px;
}

.result-card{
    margin-top:30px;
    background:white;
    padding:30px;
    border-radius:15px;
}

.review-item{
    margin-top:20px;
    border-left:5px solid #7e22ce;
    padding-left:15px;
}

.leaderboard{
    margin-top:25px;
}

#timer{
    color:red;
    font-weight:bold;
    font-size:20px;
}
</style>

</head>
<body>

<div class="container">

<h1>AI Quiz Dashboard</h1>

<h2 id="welcomeUser"></h2>

<input
type="text"
id="quizCode"
placeholder="Enter Quiz Code">

<select id="quizCategory">
<option value="Python">Python</option>
<option value="AI">Artificial Intelligence</option>
<option value="Data Science">Data Science</option>
<option value="Web Development">Web Development</option>
</select>

<button onclick="generateQuiz()">
Generate Quiz
</button>

<hr>

<input
type="text"
id="joinCode"
placeholder="Enter Quiz Code to Join">

<button onclick="joinQuiz()">
Join Quiz
</button>

<div id="quizSection"></div>

<div id="resultSection"></div>

</div>

<script src="quiz.js"></script>

</body>
</html>
