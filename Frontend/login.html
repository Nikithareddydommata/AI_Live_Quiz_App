<!DOCTYPE html>
<html>
<head>
    <title>AI Quiz Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

    <h1>AI Quiz Login</h1>

    <input type="email"
           id="loginEmail"
           placeholder="Email Address">

    <input type="password"
           id="loginPassword"
           placeholder="Password">

    <button onclick="login()">
        Login
    </button>

    <div class="signup-link">

        <p>
            Don't have an account?
        </p>

        <a href="signup.html">
            Create Account
        </a>

    </div>

</div>

<script src="login.js"></script>

</body>
</html>
